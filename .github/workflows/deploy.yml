name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔥 Build WITHOUT cache (forces Angular rebuild)
    - name: Build Backend Image
      run: docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/mean-backend:latest ./backend

    - name: Build Frontend Image
      run: docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/mean-frontend:latest ./frontend

    - name: Push Backend Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/mean-backend:latest

    - name: Push Frontend Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/mean-frontend:latest

    # 🔥 Force recreate containers on server
    - name: Deploy to VM via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}
        script: |
          cd ~/crud-dd-task-mean-app
          docker compose down
          docker compose pull
          docker compose up -d --force-recreate
